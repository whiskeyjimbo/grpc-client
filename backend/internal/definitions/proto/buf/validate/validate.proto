  bool            required       = 25;
  Ignore          ignore         = 27;

  oneof type {
    FloatRules    float     = 1;
    DoubleRules   double    = 2;
    Int32Rules    int32     = 3;
    Int64Rules    int64     = 4;
    UInt32Rules   uint32    = 5;
    UInt64Rules   uint64    = 6;
    SInt32Rules   sint32    = 7;
    SInt64Rules   sint64    = 8;
    Fixed32Rules  fixed32   = 9;
