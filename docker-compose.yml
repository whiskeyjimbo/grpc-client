services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: grpc-client-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: grpc-client-backend:latest
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      DB_PATH: /data/grpcclient.db
      SCTEST_WORKSPACE_ROOT: /workspace
      SCTEST_PROJECT_DIR: /workspace/ser-api-scenario-test
      SCTEST_ALLOWED_SUITE_ROOTS: ser-api-scenario-test/examples,ser-switchboard/test/sctest
      SCTEST_DEFAULT_RUN_TIMEOUT_SECONDS: "120"
    volumes:
      - sqlite_data:/data
      - ..:/workspace:ro

volumes:
  sqlite_data:
