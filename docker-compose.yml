services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: grpc-client-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: grpc-client-backend:latest
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      DB_PATH: /data/grpcclient.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
